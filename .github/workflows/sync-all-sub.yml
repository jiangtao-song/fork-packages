# 工作流：定时同步所有子模块上游代码
name: 定时同步所有子模块上游代码

# 触发规则
on:
  # UTC每日凌晨2点自动执行（国内10点）
  schedule:
    - cron: '0 2 * * *'
  # 支持网页手动一键运行
  workflow_dispatch:

jobs:
  sync-submodules:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取完整仓库+子模块索引配置
      - name: 完整拉取仓库与子模块索引
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      # 2. 配置Git提交身份，避免commit报错
      - name: 配置提交用户
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 同步配置并完整下载子模块源码
      - name: 加载并下载全部子模块源码
        run: |
          git submodule sync
          git submodule update --init --force

      # 4. 替代foreach方案：读取子模块路径数组，用绝对路径同步，彻底解决cd找不到目录
      - name: 逐个同步子模块（替代foreach，规避路径上下文bug）
        run: |
          # 读取所有子模块路径存入数组
          SUB_PATHS=$(git submodule status | awk '{print $2}')
          # 循环遍历每一个子模块
          for sub_path in $SUB_PATHS; do
            echo "==================== 开始同步 $sub_path ===================="
            # 使用仓库根目录绝对路径进入子模块，规避上下文缺失
            full_path="$GITHUB_WORKSPACE/$sub_path"
            echo "完整目录路径: $full_path"
            # 进入绝对路径目录同步上游
            cd "$full_path"
            git fetch origin || echo "警告：$sub_path 仓库拉取失败，跳过本次同步"
            git merge origin/HEAD || true
            # 返回仓库根目录
            cd "$GITHUB_WORKSPACE"
          done

          # 提交所有同步变更
          git add .
          git commit -m "自动同步子模块上游更新" || echo "所有子模块无更新，跳过提交"
          git push origin main
