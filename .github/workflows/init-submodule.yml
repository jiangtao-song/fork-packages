name: 初始化新增子模块
on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git提交身份
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 读取.gitmodules，批量创建子模块
        run: |
          # 定义需要添加的子模块列表
          declare -A sub_list
          sub_list["packages/openwrt-passwall2"]="https://github.com/jiangtao-song/openwrt-passwall2.git"
          sub_list["packages/openwrt-gecoosac"]="https://github.com/jiangtao-song/openwrt-gecoosac.git"
          sub_list["packages/openwrt-node-red"]="https://github.com/jiangtao-song/openwrt-node-red.git"
          sub_list["packages/openwrt-node-packages"]="https://github.com/jiangtao-song/openwrt-node-packages.git"


          # 循环遍历添加
          for path in "${!sub_list[@]}"; do
            url=${sub_list[$path]}
            if [ ! -d "$path" ]; then
              echo "正在新增子模块 $path"
              git submodule add -b main "$url" "$path"
            else
              echo "子模块 $path 已存在，跳过创建"
            fi
          done

          # 拉取所有子模块最新代码
          git submodule update --init --remote

          # 提交变更并推送
          git add .
          git commit -m "网页批量创建子模块 passwall2 + gecoosac + node-red + node-packages" || echo "无变更无需提交"
          git push origin main
