# fork-packages/.github/workflows/初始化新增子模块.yml
# 完整带注释
name: 初始化新增子模块
# 允许外部仓库API远程调用，缺少这个会完全不运行
on:
  repository_dispatch:

jobs:
  update_submodules:
    runs-on: ubuntu-latest
    steps:
      # 检出完整代码，拉取全部历史
      - name: 检出fork-packages源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 关键：拉取子模块需要开启
          submodules: false

      # 配置提交机器人
      - name: 配置Git用户
        run: |
          git config --global user.name "BuildControllerBot"
          git config --global user.email "build-bot@github.com"

      # 自动创建packages父目录（缺失这个就不会生成子模块文件夹）
      - name: 预先创建packages存放目录
        run: mkdir -p packages

      # 同步子模块配置、初始化所有子模块、拉取对应分支最新代码
      - name: 更新全部子模块
        run: |
          git submodule sync --recursive
          # --init：不存在则新建文件夹克隆；--remote：拉取对应分支最新
          git submodule update --init --recursive --remote

      # 检测子模块指针变更并提交推送
      - name: 提交子模块指针更新
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "Auto update all submodule pointers"
            git push origin main
          else
            echo "子模块指针无更新，无需提交"
          fi
